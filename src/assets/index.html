<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Antmicro's WASM shell</title>
    <link rel="icon" type="image/x-icon" href="resources/favicon.ico">
  </head>
  <body style="margin: 0px; background: black">
    <script src="./jswasi.js"></script>
    <script type="module">
      import { hterm, lib } from "./third_party/hterm.js"

      window.buffer = "";
      window.alive = true;
      window.exitCode = 0;
      window.stdoutReadData = function () {
        if (window.stdoutAttached !== undefined)
          if (window.stdoutAttached && buffer.length > 0) {
            let tmp = window.buffer;
            window.buffer = "";
            return tmp;
          }
        return null;
      };
      await Promise.all([hterm.initPromise, lib.initPromise]);

      lib.antmicroStyle["screen-padding-size"] = "8";
      lib.setAntmicroStyle();

      // hterm prints warnings that we don't really care about
      let tempWarnlog = console.warn;
      console.warn = () => {};

      let releaseStorage;
      const screenReady = new Promise((resolve) => {
        releaseStorage = resolve;
      });

      class ScreenReadyStorage extends lib.Storage.Local {
        async getItems(keys) {
          await screenReady;
          return super.getItems(keys);
        }
      }

      const terminal = new hterm.Terminal({
        storage: new ScreenReadyStorage(),
      });

      terminal.decorate(document.querySelector("#terminal"));
      await terminal.screenReady();
      releaseStorage();
      console.warn = tempWarnlog;

      const jswasi = new Jswasi();
      await jswasi.attachDevice({terminal}, 1);
      await jswasi.init();
    </script>
    <div id="terminal"></div>
  </body>
</html>
